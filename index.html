    body {
      margin: 0;
      padding: 0;
      font-size: 11pt;  
      color: #161209;
      font-family: Georgia; 
    }  

    a {
      color: inherit;
      transition: all 0.2s ease;
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
    }

    .main {
      flex-grow: 1;
    }

    .main .inner {
      margin: 1em;
      padding: 1em;
      transform: translateY(12vh);
      text-align: center;
    }

    .main img.avatar {
      width: 128px;
      height: 128px;
      display: inline-block;
      border-radius: 100%;
      box-shadow: 0 0 0 0.3618em rgba(0, 0, 0, 0.05);
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .main img.avatar:hover {
      position: relative;
      transform: translateY(-0.75em);
      cursor: pointer;
    }

    .main a:hover {
      font-size: 1.1em;
      transition: all 0.2s ease;
    }

    .main h2 {
      font-size: 2em;
    }

    .main svg.icon {
      vertical-align: middle;
    }

    .main img.weixin {
      display: none;
      margin: auto;
      box-shadow: 0 0 0 0.3618em rgba(0, 0, 0, 0.05);
      max-width: 300px;
      position: fixed;
      bottom: 0;
      right: 0;
      /*top: 0;*/
      left: 0;
    }

    .footer {
      height: 4em;
    }

    .footer .inner {
      text-align: center;
    }

    .footer a {
      text-decoration: none;
    }
